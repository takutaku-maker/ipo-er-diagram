<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>会計システムフロー概要図</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans','Meiryo',sans-serif;background:#f7f8fc;color:#1a202c;padding:32px 24px}
h1{text-align:center;font-size:1.35rem;color:#1e293b;margin-bottom:32px;letter-spacing:.5px}

.diagram-area{position:relative;margin:0 auto;max-width:1100px}

/* ===== SVG canvas ===== */
.flow-svg{width:100%;overflow:visible}
.flow-svg text{font-family:'Segoe UI','Hiragino Sans','Meiryo',sans-serif}

/* ===== Section labels ===== */
.section-bg{rx:10;ry:10}

/* ===== Tooltip ===== */
.tip{position:absolute;background:#1e293b;color:#fff;font-size:.72rem;padding:6px 10px;border-radius:6px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;max-width:220px;line-height:1.45}
