<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPO推進 ガントチャート v3 (Live)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #FEDA3E;
  --dark: #333333;
  --gray: #626161;
  --darkGray: #4D4D4D;
  --lightBg: #FFFBEC;
  --midGray: #E0E0E0;
  --white: #FFFFFF;
  --lightYel: #FFFBEC;
  --name-col-width: 340px;
  --row-height: 32px;
  --subtask-row-height: 28px;
  --group-header-height: 35px;
  --month-width: 60px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--white);
  color: var(--dark);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--dark);
  color: var(--white);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header h1 {
  font-size: 18px;
  font-weight: 700;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 13px;
}
.legend {
  display: flex;
  gap: 12px;
  align-items: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
}
.legend-swatch {
  width: 14px;
  height: 14px;
  border-radius: 2px;
  border: 1px solid var(--midGray);
}
.refresh-btn {
  background: var(--accent);
  color: var(--dark);
  border: none;
  border-radius: 4px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: opacity 0.2s;
}
.refresh-btn:hover { opacity: 0.85; }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.refresh-btn .spinner {
  display: none;
  width: 14px; height: 14px;
  border: 2px solid var(--dark);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.refresh-btn.loading .spinner { display: inline-block; }
.refresh-btn.loading .btn-text { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.update-info {
  font-size: 11px;
  color: #aaa;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  line-height: 1.3;
}

/* TIMELINE HEADER */
.timeline-header-wrapper {
  flex-shrink: 0;
  overflow: hidden;
  border-bottom: 2px solid var(--dark);
  background: var(--lightBg);
}
.timeline-header-inner {
  display: flex;
  min-width: max-content;
}
.timeline-header-name {
  position: sticky;
  left: 0;
  z-index: 10;
  width: var(--name-col-width);
  min-width: var(--name-col-width);
  background: var(--lightBg);
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: flex-end;
  padding: 8px 12px;
  border-right: 1px solid var(--midGray);
}
.timeline-months {
  display: flex;
}
.year-group {
  display: flex;
  flex-direction: column;
}
.year-label {
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 0;
  border-bottom: 1px solid var(--midGray);
}
.month-row {
  display: flex;
}
.month-cell {
  width: var(--month-width);
  text-align: center;
  font-size: 10px;
  padding: 4px 0;
  border-right: 1px solid #eee;
}
.month-cell.quarter-start {
  border-right: 1px solid var(--midGray);
}

/* GANTT BODY */
.gantt-body {
  flex: 1;
  overflow: auto;
  position: relative;
}
.gantt-body-inner {
  position: relative;
  min-height: 100%;
}

/* ROWS */
.gantt-row {
  display: flex;
  height: var(--row-height);
  border-bottom: 1px solid #f0f0f0;
  align-items: center;
}
.gantt-row:hover {
  background: var(--lightBg);
}
.group-header {
  display: flex;
  height: var(--group-header-height);
  align-items: center;
  border-bottom: 1px solid var(--midGray);
}
.row-name {
  position: sticky;
  left: 0;
  z-index: 5;
  width: var(--name-col-width);
  min-width: var(--name-col-width);
  background: var(--white);
  padding: 0 12px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  height: 100%;
  border-right: 1px solid var(--midGray);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.group-header .row-name {
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.5px;
}
.gantt-row:hover .row-name {
  background: var(--lightBg);
}
.row-bars {
  flex: 1;
  position: relative;
  height: 100%;
}

/* STATUS DOT */
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.in-progress { background: var(--accent); }
.status-dot.not-started { background: var(--lightBg); border: 1px solid var(--midGray); }
.status-dot.completed { background: var(--midGray); }
.status-dot.no-status { background: #ccc; }

/* TOGGLE ARROW */
.toggle-arrow {
  cursor: pointer;
  font-size: 10px;
  color: var(--gray);
  user-select: none;
  flex-shrink: 0;
}
.toggle-arrow:hover { color: var(--dark); }

/* TASK NAME */
.task-name-text {
  overflow: hidden;
  text-overflow: ellipsis;
}
.subtask-badge {
  font-size: 10px;
  color: var(--gray);
  flex-shrink: 0;
}

/* BARS */
.gantt-bar {
  position: absolute;
  height: 14px;
  top: 50%;
  transform: translateY(-50%);
  border-radius: 3px;
}
.gantt-bar.in-progress { background: var(--accent); }
.gantt-bar.not-started { background: var(--lightBg); border: 1px solid var(--midGray); }
.gantt-bar.completed { background: var(--midGray); }
.gantt-bar.no-status { background: #e0e0e0; border: 1px solid #ccc; }

/* MILESTONE */
.milestone-marker {
  position: absolute;
  width: 14px;
  height: 14px;
  top: 50%;
  transform: translateY(-50%) rotate(45deg);
  border: 2px solid var(--dark);
}
.milestone-marker.in-progress { background: var(--accent); }
.milestone-marker.not-started { background: var(--lightBg); }
.milestone-marker.completed { background: var(--midGray); }
.milestone-marker.no-status { background: #ddd; }

/* SUBTASK ROW */
.subtask-row {
  height: var(--subtask-row-height);
  display: none;
  background: #fafafa;
}
.subtask-row.visible {
  display: flex;
}
.subtask-row .row-name {
  padding-left: 40px;
  font-size: 11px;
  color: var(--gray);
  background: #fafafa;
}
.subtask-row:hover .row-name { background: var(--lightBg); }
.subtask-line {
  position: absolute;
  height: 6px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--midGray);
  border-radius: 2px;
  opacity: 0.5;
}

/* QUARTER LINE */
.quarter-line {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: var(--midGray);
  opacity: 0.4;
  z-index: 1;
}

/* TODAY LINE */
.today-line {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: #E53935;
  z-index: 3;
}
.today-label {
  position: absolute;
  top: 0;
  left: -14px;
  background: #E53935;
  color: white;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 2px;
  opacity: 0.5;
}

/* TOOLTIP */
.tooltip {
  position: fixed;
  background: var(--dark);
  color: var(--white);
  padding: 8px 12px;
  border-radius: 4px;
  font-size: 12px;
  line-height: 1.5;
  z-index: 200;
  pointer-events: none;
  display: none;
  max-width: 320px;
}

/* FOOTER */
.footer {
  flex-shrink: 0;
  text-align: center;
  padding: 8px;
  font-size: 14px;
  color: var(--gray);
  border-top: 1px solid var(--midGray);
  background: var(--white);
}

/* PAT DIALOG */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.overlay.hidden { display: none; }
.dialog {
  background: var(--white);
  border-radius: 8px;
  padding: 32px;
  max-width: 480px;
  width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.dialog h2 {
  font-size: 18px;
  margin-bottom: 12px;
}
.dialog p {
  font-size: 13px;
  color: var(--gray);
  margin-bottom: 16px;
  line-height: 1.6;
}
.dialog input[type="text"] {
  width: 100%;
  padding: 10px 12px;
  font-size: 14px;
  font-family: monospace;
  border: 1px solid var(--midGray);
  border-radius: 4px;
  margin-bottom: 16px;
}
.dialog .btn-row {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.dialog button {
  padding: 8px 20px;
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 700;
}
.dialog .btn-primary {
  background: var(--accent);
  color: var(--dark);
}
.dialog .btn-secondary {
  background: var(--midGray);
  color: var(--dark);
}

/* LOADING OVERLAY */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.9);
  z-index: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.loading-overlay.hidden { display: none; }
.loading-spinner {
  width: 40px; height: 40px;
  border: 4px solid var(--midGray);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text {
  font-size: 14px;
  color: var(--gray);
}

/* ERROR BANNER */
.error-banner {
  background: #FFEBEE;
  color: #C62828;
  padding: 12px 24px;
  font-size: 13px;
  display: none;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.error-banner.visible { display: flex; }
.error-banner .close-err {
  margin-left: auto;
  background: none;
  border: none;
  color: #C62828;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- PAT DIALOG -->
<div class="overlay hidden" id="patDialog">
  <div class="dialog">
    <h2>Asana Personal Access Token</h2>
    <p>
      Asana APIに接続するためにPersonal Access Tokenが必要です。<br>
      <a href="https://app.asana.com/0/my-apps" target="_blank" style="color:#1565C0">Asana Developer Console</a>
      で「Personal access tokens」から発行できます。
    </p>
    <input type="text" id="patInput" placeholder="1/12345678:abcdef..." autocomplete="off">
    <div class="btn-row">
      <button class="btn-primary" id="patSave">接続</button>
    </div>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">Asanaからデータを取得中...</div>
</div>

<!-- ERROR -->
<div class="error-banner" id="errorBanner">
  <span id="errorMsg"></span>
  <button class="close-err" id="closeErr">&times;</button>
</div>

<div class="header">
  <h1>IPO推進 ガントチャート <span style="font-size:12px;color:var(--accent);font-weight:400">LIVE</span></h1>
  <div class="header-right">
    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent)"></div>仕掛中</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--lightBg);border:1px solid var(--midGray)"></div>未着手</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--midGray)"></div>完了</div>
      <div class="legend-item"><div style="width:12px;height:12px;transform:rotate(45deg);border:2px solid var(--dark);background:var(--accent)"></div>MS</div>
    </div>
    <div class="update-info">
      <span id="taskCount">-- tasks</span>
      <span id="lastUpdate">--</span>
    </div>
    <button class="refresh-btn" id="refreshBtn" title="Asanaから最新データを取得">
      <div class="spinner"></div>
      <span class="btn-text">&#x21bb; 更新</span>
    </button>
    <button class="refresh-btn" id="settingsBtn" title="PAT設定" style="background:#555;color:#fff;padding:6px 10px;">
      <span>&#x2699;</span>
    </button>
  </div>
</div>

<div class="timeline-header-wrapper" id="timelineHeader">
</div>

<div class="gantt-body" id="ganttBody">
  <div class="gantt-body-inner" id="ganttInner">
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="footer">Copyrights &copy; 2026 REVISE Co.Ltd., All Rights Reserved</div>

<script>
// ============ CONFIG ============
const SECTION_GID = '1213528680128590'; // IPO推進 section
const ASANA_BASE = 'https://app.asana.com/api/1.0';
const SUBTASK_THRESHOLD = 0; // fetch subtasks for any task with num_subtasks > 0

// ============ STATE ============
let DATA = [];
let SUBTASKS = {};
let lastFetchTime = null;

// ============ TIMELINE CONFIG ============
const TIMELINE_START = new Date(2026, 0, 1);
const TIMELINE_END = new Date(2029, 5, 30);
const MONTH_WIDTH = 60;

function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

const months = [];
let cur = new Date(TIMELINE_START);
while (cur <= TIMELINE_END) {
  months.push({ year: cur.getFullYear(), month: cur.getMonth() });
  cur.setMonth(cur.getMonth() + 1);
}
const TOTAL_WIDTH = months.length * MONTH_WIDTH;

// ============ PAT MANAGEMENT ============
function getPAT() {
  return localStorage.getItem('asana_pat') || '';
}
function savePAT(pat) {
  localStorage.setItem('asana_pat', pat);
}

// ============ ASANA API ============
async function asanaGet(path) {
  const pat = getPAT();
  if (!pat) throw new Error('PAT not set');
  const res = await fetch(ASANA_BASE + path, {
    headers: { 'Authorization': 'Bearer ' + pat }
  });
  if (!res.ok) {
    if (res.status === 401 || res.status === 403) {
      throw new Error('認証エラー: PATが無効です。設定を確認してください。');
    }
    throw new Error('Asana API error: ' + res.status + ' ' + res.statusText);
  }
  return (await res.json()).data;
}

async function fetchAllTasks() {
  const fields = 'name,start_on,due_on,completed,resource_subtype,tags.name,custom_fields.display_value,custom_fields.name,num_subtasks';
  let allTasks = [];
  let offset = null;

  do {
    let url = '/tasks?section=' + SECTION_GID + '&opt_fields=' + fields + '&limit=100';
    if (offset) url += '&offset=' + offset;
    const res = await fetch(ASANA_BASE + url, {
      headers: { 'Authorization': 'Bearer ' + getPAT() }
    });
    if (!res.ok) {
      if (res.status === 401 || res.status === 403) {
        throw new Error('認証エラー: PATが無効です。');
      }
      throw new Error('Asana API error: ' + res.status);
    }
    const json = await res.json();
    allTasks = allTasks.concat(json.data);
    offset = json.next_page ? json.next_page.offset : null;
  } while (offset);

  return allTasks;
}

function parseTask(raw) {
  // Extract status from custom_fields
  let status = '';
  if (raw.custom_fields) {
    for (const cf of raw.custom_fields) {
      if (cf.name === 'ステータス' || cf.name === 'Status') {
        status = cf.display_value || '';
        break;
      }
    }
  }
  // Extract tags
  const tags = (raw.tags || []).map(t => t.name).join(', ');

  return {
    gid: raw.gid,
    n: raw.name,
    s: raw.start_on || '',
    d: raw.due_on || '',
    c: raw.completed,
    t: raw.resource_subtype || 'default_task',
    tag: tags,
    st: status,
    ns: raw.num_subtasks || 0,
  };
}

async function fetchSubtasks(taskGid) {
  const subs = await asanaGet('/tasks/' + taskGid + '/subtasks?opt_fields=name');
  return subs.map(s => ({ n: s.name }));
}

async function loadData() {
  const loadingEl = document.getElementById('loadingOverlay');
  const loadingText = document.getElementById('loadingText');
  loadingEl.classList.remove('hidden');
  loadingText.textContent = 'Asanaからタスクを取得中...';

  try {
    const rawTasks = await fetchAllTasks();
    DATA = rawTasks.map(parseTask);

    // Fetch subtasks for tasks that have them
    SUBTASKS = {};
    const tasksWithSubs = DATA.filter(t => t.ns > 0);
    loadingText.textContent = 'サブタスクを取得中 (0/' + tasksWithSubs.length + ')...';

    for (let i = 0; i < tasksWithSubs.length; i++) {
      const t = tasksWithSubs[i];
      loadingText.textContent = 'サブタスクを取得中 (' + (i + 1) + '/' + tasksWithSubs.length + ')...';
      try {
        SUBTASKS[t.gid] = await fetchSubtasks(t.gid);
      } catch (e) {
        console.warn('Failed to fetch subtasks for ' + t.gid, e);
      }
    }

    lastFetchTime = new Date();
    updateHeader();
    rebuildChart();
    hideError();
  } catch (e) {
    showError(e.message);
  } finally {
    loadingEl.classList.add('hidden');
  }
}

// ============ UTILITY ============
function dateToX(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  const diffMs = d - TIMELINE_START;
  const totalMs = TIMELINE_END - TIMELINE_START;
  return (diffMs / totalMs) * TOTAL_WIDTH;
}

function getFirstTag(tagStr) {
  if (!tagStr || !tagStr.trim()) return '99_未分類';
  return tagStr.split(',')[0].trim();
}

function getStatusClass(task) {
  if (task.c || task.st === '完了') return 'completed';
  if (task.st === '仕掛中') return 'in-progress';
  if (task.st === '未着手') return 'not-started';
  return 'no-status';
}

function getStatusLabel(task) {
  if (task.c || task.st === '完了') return '完了';
  if (task.st === '仕掛中') return '仕掛中';
  if (task.st === '未着手') return '未着手';
  return '−';
}

// ============ GROUPING ============
const tagOrder = [
  '00', '01 ', '01_', '02 ', '02_', '03_', '04_', '05_', '06_',
  '07_', '08_', '09_', '10_', '11_', '12_', '13_', '14_', '99_'
];

function tagSortKey(tag) {
  for (let i = 0; i < tagOrder.length; i++) {
    if (tag.startsWith(tagOrder[i])) return i;
  }
  return 999;
}

// ============ BUILD TIMELINE HEADER ============
function buildTimelineHeader() {
  const wrapper = document.getElementById('timelineHeader');
  wrapper.innerHTML = '';
  const inner = document.createElement('div');
  inner.className = 'timeline-header-inner';

  const nameCol = document.createElement('div');
  nameCol.className = 'timeline-header-name';
  nameCol.textContent = 'タスク名';
  inner.appendChild(nameCol);

  const monthsArea = document.createElement('div');
  monthsArea.className = 'timeline-months';

  const yearGroups = {};
  months.forEach(m => {
    if (!yearGroups[m.year]) yearGroups[m.year] = [];
    yearGroups[m.year].push(m);
  });

  Object.keys(yearGroups).sort().forEach(year => {
    const yg = document.createElement('div');
    yg.className = 'year-group';

    const yl = document.createElement('div');
    yl.className = 'year-label';
    yl.textContent = year;
    yl.style.width = (yearGroups[year].length * MONTH_WIDTH) + 'px';
    yg.appendChild(yl);

    const mr = document.createElement('div');
    mr.className = 'month-row';
    yearGroups[year].forEach(m => {
      const mc = document.createElement('div');
      mc.className = 'month-cell';
      if (m.month % 3 === 0) mc.classList.add('quarter-start');
      mc.textContent = (m.month + 1) + '月';
      mr.appendChild(mc);
    });
    yg.appendChild(mr);
    monthsArea.appendChild(yg);
  });

  inner.appendChild(monthsArea);
  wrapper.appendChild(inner);
}

// ============ BUILD BODY ============
function buildBody() {
  const container = document.getElementById('ganttInner');
  container.innerHTML = '';
  container.style.width = (MONTH_WIDTH * months.length + parseInt(getComputedStyle(document.documentElement).getPropertyValue('--name-col-width'))) + 'px';

  // Group tasks
  const groups = {};
  DATA.forEach(task => {
    const tag = getFirstTag(task.tag);
    if (!groups[tag]) groups[tag] = [];
    groups[tag].push(task);
  });

  const sortedTags = Object.keys(groups).sort((a, b) => {
    const ka = tagSortKey(a);
    const kb = tagSortKey(b);
    if (ka !== kb) return ka - kb;
    return a.localeCompare(b, 'ja');
  });

  // Quarter lines
  months.forEach((m, i) => {
    if (m.month % 3 === 0) {
      const ql = document.createElement('div');
      ql.className = 'quarter-line';
      ql.style.left = (340 + i * MONTH_WIDTH) + 'px';
      container.appendChild(ql);
    }
  });

  // Today line
  const todayStr = getTodayStr();
  const todayX = dateToX(todayStr);
  if (todayX !== null) {
    const tl = document.createElement('div');
    tl.className = 'today-line';
    tl.style.left = (340 + todayX) + 'px';
    const tlabel = document.createElement('div');
    tlabel.className = 'today-label';
    tlabel.textContent = 'TODAY';
    tl.appendChild(tlabel);
    container.appendChild(tl);
  }

  sortedTags.forEach(tag => {
    // Group header
    const gh = document.createElement('div');
    gh.className = 'group-header';
    const ghName = document.createElement('div');
    ghName.className = 'row-name';
    ghName.textContent = tag + ' (' + groups[tag].length + ')';
    ghName.style.background = 'var(--darkGray)';
    ghName.style.color = 'var(--white)';
    gh.appendChild(ghName);
    const ghBars = document.createElement('div');
    ghBars.className = 'row-bars';
    gh.appendChild(ghBars);
    container.appendChild(gh);

    // Tasks
    groups[tag].forEach(task => {
      const row = document.createElement('div');
      row.className = 'gantt-row';
      row.dataset.gid = task.gid;

      const nameDiv = document.createElement('div');
      nameDiv.className = 'row-name';

      // Status dot
      const dot = document.createElement('div');
      dot.className = 'status-dot ' + getStatusClass(task);
      nameDiv.appendChild(dot);

      // Toggle arrow if subtasks
      const hasSubtasks = task.ns > 0 && SUBTASKS[task.gid] && SUBTASKS[task.gid].length > 0;
      if (hasSubtasks) {
        const arrow = document.createElement('span');
        arrow.className = 'toggle-arrow';
        arrow.textContent = '\u25B6';
        arrow.dataset.gid = task.gid;
        arrow.addEventListener('click', function(e) {
          e.stopPropagation();
          const gid = this.dataset.gid;
          const expanded = this.textContent === '\u25BC';
          this.textContent = expanded ? '\u25B6' : '\u25BC';
          document.querySelectorAll('.subtask-row[data-parent="' + gid + '"]').forEach(r => {
            r.classList.toggle('visible', !expanded);
          });
        });
        nameDiv.appendChild(arrow);
      }

      const nameText = document.createElement('span');
      nameText.className = 'task-name-text';
      nameText.textContent = task.n;
      nameDiv.appendChild(nameText);

      if (hasSubtasks) {
        const badge = document.createElement('span');
        badge.className = 'subtask-badge';
        badge.textContent = '(' + SUBTASKS[task.gid].length + ')';
        nameDiv.appendChild(badge);
      }

      row.appendChild(nameDiv);

      // Bar area
      const barArea = document.createElement('div');
      barArea.className = 'row-bars';

      if (task.t === 'milestone') {
        const dx = dateToX(task.d);
        if (dx !== null) {
          const diamond = document.createElement('div');
          diamond.className = 'milestone-marker ' + getStatusClass(task);
          diamond.style.left = (dx - 7) + 'px';
          diamond.addEventListener('mouseenter', showTooltip.bind(null, task));
          diamond.addEventListener('mouseleave', hideTooltip);
          barArea.appendChild(diamond);
        }
      } else {
        const startDate = task.s || task.d;
        const endDate = task.d;
        if (startDate && endDate) {
          const sx = dateToX(startDate);
          const ex = dateToX(endDate);
          if (sx !== null && ex !== null) {
            const bar = document.createElement('div');
            bar.className = 'gantt-bar ' + getStatusClass(task);
            bar.style.left = sx + 'px';
            bar.style.width = Math.max(ex - sx, 4) + 'px';
            bar.addEventListener('mouseenter', showTooltip.bind(null, task));
            bar.addEventListener('mouseleave', hideTooltip);
            barArea.appendChild(bar);
          }
        }
      }

      row.appendChild(barArea);
      container.appendChild(row);

      // Subtask rows
      if (hasSubtasks) {
        const parentStart = task.s || task.d;
        const parentEnd = task.d;
        SUBTASKS[task.gid].forEach(st => {
          const srow = document.createElement('div');
          srow.className = 'gantt-row subtask-row';
          srow.dataset.parent = task.gid;

          const sname = document.createElement('div');
          sname.className = 'row-name';
          const stext = document.createElement('span');
          stext.className = 'task-name-text';
          stext.textContent = st.n;
          sname.appendChild(stext);
          srow.appendChild(sname);

          const sbar = document.createElement('div');
          sbar.className = 'row-bars';
          if (parentStart && parentEnd) {
            const sx = dateToX(parentStart);
            const ex = dateToX(parentEnd);
            if (sx !== null && ex !== null) {
              const line = document.createElement('div');
              line.className = 'subtask-line';
              line.style.left = sx + 'px';
              line.style.width = Math.max(ex - sx, 4) + 'px';
              sbar.appendChild(line);
            }
          }
          srow.appendChild(sbar);
          container.appendChild(srow);
        });
      }
    });
  });
}

// ============ TOOLTIP ============
const tooltipEl = document.getElementById('tooltip');

function showTooltip(task, e) {
  const lines = [];
  lines.push('<strong>' + task.n + '</strong>');
  if (task.s) lines.push('開始: ' + task.s);
  if (task.d) lines.push('期日: ' + task.d);
  lines.push('ステータス: ' + getStatusLabel(task));
  if (task.t === 'milestone') lines.push('種別: マイルストーン');
  if (task.tag) lines.push('タグ: ' + task.tag);
  tooltipEl.innerHTML = lines.join('<br>');
  tooltipEl.style.display = 'block';
  positionTooltip(e);
}

function positionTooltip(e) {
  tooltipEl.style.left = (e.clientX + 12) + 'px';
  tooltipEl.style.top = (e.clientY + 12) + 'px';
}

function hideTooltip() {
  tooltipEl.style.display = 'none';
}

document.addEventListener('mousemove', function(e) {
  if (tooltipEl.style.display === 'block') positionTooltip(e);
});

// ============ UI HELPERS ============
function updateHeader() {
  document.getElementById('taskCount').textContent = DATA.length + ' tasks';
  if (lastFetchTime) {
    const h = String(lastFetchTime.getHours()).padStart(2, '0');
    const m = String(lastFetchTime.getMinutes()).padStart(2, '0');
    document.getElementById('lastUpdate').textContent = '最終取得 ' + h + ':' + m;
  }
}

function rebuildChart() {
  buildTimelineHeader();
  buildBody();
  syncScroll();
  setTimeout(scrollToToday, 100);
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBanner').classList.add('visible');
}
function hideError() {
  document.getElementById('errorBanner').classList.remove('visible');
}

// ============ SYNC SCROLL ============
function syncScroll() {
  const body = document.getElementById('ganttBody');
  const header = document.getElementById('timelineHeader');
  body.addEventListener('scroll', function() {
    header.scrollLeft = body.scrollLeft;
  });
}

// ============ SCROLL TO TODAY ============
function scrollToToday() {
  const body = document.getElementById('ganttBody');
  const todayX = dateToX(getTodayStr());
  if (todayX !== null) {
    body.scrollLeft = Math.max(0, todayX - 200);
  }
}

// ============ EVENT LISTENERS ============
document.getElementById('refreshBtn').addEventListener('click', async function() {
  this.classList.add('loading');
  this.disabled = true;
  await loadData();
  this.classList.remove('loading');
  this.disabled = false;
});

document.getElementById('settingsBtn').addEventListener('click', function() {
  document.getElementById('patInput').value = getPAT();
  document.getElementById('patDialog').classList.remove('hidden');
});

document.getElementById('patSave').addEventListener('click', function() {
  const pat = document.getElementById('patInput').value.trim();
  if (!pat) return;
  savePAT(pat);
  document.getElementById('patDialog').classList.add('hidden');
  loadData();
});

document.getElementById('closeErr').addEventListener('click', hideError);

// Handle Enter key in PAT input
document.getElementById('patInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('patSave').click();
});

// ============ INIT ============
(async function init() {
  if (!getPAT()) {
    document.getElementById('patDialog').classList.remove('hidden');
  } else {
    await loadData();
  }
})();
</script>
</body>
