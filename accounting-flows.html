/* Header */
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:16px 24px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}

.tab{padding:8px 20px;border:none;background:#f1f5f9;color:#64748b;font-size:.82rem;font-weight:600;border-radius:8px 8px 0 0;cursor:pointer;transition:all .15s;font-family:inherit;position:relative}
.tab:hover{background:#e2e8f0;color:#334155}
.tab.active{background:#2563eb;color:#fff}
.tab .badge{display:inline-block;font-size:.65rem;padding:1px 6px;border-radius:10px;margin-left:6px;font-weight:700}
.tab.active .badge{background:rgba(255,255,255,.25);color:#fff}
.tab:not(.active) .badge{background:#e2e8f0;color:#94a3b8}

/* Panel */
.panel{display:none;padding:24px 20px}
.panel.active{display:block}
.diagram{margin:0 auto;max-width:1120px}
svg{width:100%;overflow:visible}
svg text{font-family:'Segoe UI','Hiragino Sans','Meiryo',sans-serif}

/* Overview-specific */
.diagram-area{margin:0 auto 28px;max-width:1100px}
.flow-svg{width:100%;overflow:visible}
.flow-svg text{font-family:'Segoe UI','Hiragino Sans','Meiryo',sans-serif}
