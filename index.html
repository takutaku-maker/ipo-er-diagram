const LC={m:"#3B82F6",s:"#0891B2",d:"#D97706",r:"#EF4444",p:"#818CF8"};
const LD={m:"",s:"6,3",d:"8,4",r:"4,3",p:"10,5"};
const svg=document.getElementById("lines"),tt=document.getElementById("tip");
const eMap={};const lEls=[];

E.forEach(e=>{
const d=document.createElement("div");d.className=`entity c-${e.cat}`;d.style.left=e.x+"px";d.style.top=e.y+"px";
// Timeline badge
const badge=e.tl?`<div class="tl-badge tl-${e.tl}">${TL[e.tl].label}</div>`:"";
let ah=e.attrs.map(a=>`<div class="at"><span class="ak ${a.k==='★'||a.k==='●'?'pk':''}">${a.k}</span>${a.v}</div>`).join("");
let sh=e.src?`<div class="src">出典: ${e.src}</div>`:"";
d.innerHTML=`${badge}<div class="e-h"><span class="ic">${e.icon}</span>${e.title}</div><div class="e-b">${ah}${sh}</div>`;
let dr=false,sx,sy,ox,oy;
d.onmousedown=ev=>{dr=true;sx=ev.clientX;sy=ev.clientY;ox=parseInt(d.style.left);oy=parseInt(d.style.top);d.style.zIndex=60;ev.preventDefault()};
document.addEventListener("mousemove",ev=>{if(!dr)return;d.style.left=(ox+ev.clientX-sx)+"px";d.style.top=(oy+ev.clientY-sy)+"px";draw()});
document.addEventListener("mouseup",()=>{if(dr){dr=false;d.style.zIndex=10}});
d.onmouseenter=()=>{tt.innerHTML=`<h4>${e.icon} ${e.title}</h4>${e.tip}<div class="ts">出典: ${e.src||""}</div>`;tt.classList.add("vis")};
d.onmouseleave=()=>tt.classList.remove("vis");
d.onmousemove=ev=>{let tx=ev.clientX+12,ty=ev.clientY+8;if(tx+260>window.innerWidth)tx=ev.clientX-270;if(ty+100>window.innerHeight)ty=ev.clientY-110;tt.style.left=tx+"px";tt.style.top=ty+"px"};
ctr.appendChild(d);eMap[e.id]=d;
});

function gc(el){const r=el.getBoundingClientRect(),c=ctr.getBoundingClientRect();return{x:r.left-c.left+r.width/2,y:r.top-c.top+r.height/2}}
function draw(){
let s=`<defs>`;Object.keys(LC).forEach(t=>{s+=`<marker id="a-${t}" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="${LC[t]}" opacity=".6"/></marker>`});s+=`</defs>`;
lEls.forEach(l=>l.remove());lEls.length=0;
R.forEach(r=>{const fe=eMap[r.f],te=eMap[r.t];if(!fe||!te)return;const f=gc(fe),t=gc(te);
s+=`<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}" stroke="${LC[r.y]||'#64748B'}" stroke-width="1.1" stroke-opacity=".35" stroke-dasharray="${LD[r.y]||''}" marker-end="url(#a-${r.y})"/>`;
if(r.l){const lb=document.createElement("div");lb.className="rl";lb.textContent=r.l;lb.style.left=((f.x+t.x)/2-16)+"px";lb.style.top=((f.y+t.y)/2-6)+"px";ctr.appendChild(lb);lEls.push(lb)}
});svg.innerHTML=s}
draw();window.addEventListener("resize",draw);
</script>
